# Knowledge Tree Configuration
# =============================
# Priority: environment variables > .env file > this YAML > Python defaults
#
# Every setting belongs to a section. Keys within each section are short names
# scoped to that section (e.g. orchestrator.model, edges.min_weight).
# Env vars still use the flat name (e.g. ORCHESTRATOR_MODEL).
# Secrets (API keys, JWT, OAuth) belong in .env, not here.


# =============================================================================
# Infrastructure — databases, vector search, cache, sync, logging
# =============================================================================
infrastructure:
  # database_url: "postgresql+asyncpg://kt:localdev@localhost:5432/knowledge_tree"
  # db_pool_size: 10
  # db_max_overflow: 20
  # db_pool_timeout: 30

  # write_database_url: "postgresql+asyncpg://kt:localdev@localhost:5434/knowledge_tree_write"
  # write_db_pool_size: 30
  # write_db_max_overflow: 60
  # write_db_pool_timeout: 60

  # qdrant_url: "http://localhost:6333"
  # redis_url: "redis://localhost:6379/0"

  # sync_interval_seconds: 5
  # sync_batch_size: 100
  # pipeline_concurrency: 10

  # log_level: "INFO"


