name: Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: knowledge_tree
          POSTGRES_USER: kt
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kt -d knowledge_tree"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      postgres-write:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: knowledge_tree_write
          POSTGRES_USER: kt
          POSTGRES_PASSWORD: localdev
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U kt -d knowledge_tree_write"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://kt:localdev@localhost:5432/knowledge_tree
      WRITE_DATABASE_URL: postgresql+asyncpg://kt:localdev@localhost:5435/knowledge_tree_write
      REDIS_URL: redis://localhost:6379
      SKIP_AUTH: "true"
      HATCHET_CLIENT_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkNJIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --frozen
      - name: Run lib tests
        run: |
          uv run pytest libs/kt-config/tests/ -x --ignore=libs/kt-config/tests/integration
          uv run pytest libs/kt-db/tests/ -x --ignore=libs/kt-db/tests/integration
          uv run pytest libs/kt-models/tests/ -x --ignore=libs/kt-models/tests/integration
          uv run pytest libs/kt-providers/tests/ -x --ignore=libs/kt-providers/tests/integration
          uv run pytest libs/kt-graph/tests/ -x --ignore=libs/kt-graph/tests/integration
          uv run pytest libs/kt-facts/tests/ -x --ignore=libs/kt-facts/tests/integration
          uv run pytest libs/kt-ontology/tests/ -x --ignore=libs/kt-ontology/tests/integration --ignore=libs/kt-ontology/tests/test_crystallization.py
      - name: Run service tests
        run: |
          uv run pytest services/api/tests/ -x --ignore=services/api/tests/integration
          uv run pytest services/mcp/tests/ -x --ignore=services/mcp/tests/integration
          uv run pytest services/worker-orchestrator/tests/ -x --ignore=services/worker-orchestrator/tests/integration
          uv run pytest services/worker-search/tests/ -x --ignore=services/worker-search/tests/integration
          uv run pytest services/worker-nodes/tests/ -x --ignore=services/worker-nodes/tests/integration
          uv run pytest services/worker-query/tests/ -x --ignore=services/worker-query/tests/integration
          uv run pytest services/worker-ingest/tests/ -x --ignore=services/worker-ingest/tests/integration
          uv run pytest services/worker-conversations/tests/ -x --ignore=services/worker-conversations/tests/integration

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: cd frontend && pnpm lint
      - run: cd frontend && pnpm type-check
      - run: cd frontend && pnpm test
