apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-worker-bottomup
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "worker-bottomup") | nindent 4 }}
spec:
  replicas: {{ .Values.workers.bottomup.replicas }}
  selector:
    matchLabels:
      {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "worker-bottomup") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "worker-bottomup") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "knowledge-tree.initWaitContainers" . | nindent 8 }}
        {{- include "knowledge-tree.initWaitForToken" . | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "knowledge-tree.image" (dict "root" . "image" .Values.workers.bottomup.image "defaultName" "openktree-worker-bottomup") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- include "knowledge-tree.sharedEnv" . | nindent 12 }}
            {{- if .Values.workers.bottomup.bottomUpMaxRuns }}
            - name: BOTTOM_UP_MAX_RUNS
              value: {{ .Values.workers.bottomup.bottomUpMaxRuns | quote }}
            {{- end }}
            {{- if .Values.workers.bottomup.bottomUpPrepareMaxRuns }}
            - name: BOTTOM_UP_PREPARE_MAX_RUNS
              value: {{ .Values.workers.bottomup.bottomUpPrepareMaxRuns | quote }}
            {{- end }}
            {{- if .Values.workers.bottomup.agentSelectMaxRuns }}
            - name: AGENT_SELECT_MAX_RUNS
              value: {{ .Values.workers.bottomup.agentSelectMaxRuns | quote }}
            {{- end }}
            {{- if .Values.workers.bottomup.workerBottomupSlots }}
            - name: WORKER_BOTTOMUP_SLOTS
              value: {{ .Values.workers.bottomup.workerBottomupSlots | quote }}
            {{- end }}
            {{- if .Values.workers.bottomup.workerBottomupDurableSlots }}
            - name: WORKER_BOTTOMUP_DURABLE_SLOTS
              value: {{ .Values.workers.bottomup.workerBottomupDurableSlots | quote }}
            {{- end }}
          volumeMounts:
            {{- include "knowledge-tree.configVolumeMount" . | nindent 12 }}
          resources:
            {{- toYaml .Values.workers.bottomup.resources | nindent 12 }}
      volumes:
        {{- include "knowledge-tree.configVolume" . | nindent 8 }}
