# =============================================================================
# Models — default LLM and global model settings
# =============================================================================
models:
  default: "openrouter/x-ai/grok-4.1-fast"
  # default_thinking_level: ""
  # enable_secondary_models: false


# =============================================================================
# Embeddings — model, dimensions, batching
# =============================================================================
# embeddings:
#   model: "openrouter/openai/text-embedding-3-large"
#   dimensions: 3072
#   timeout: 120
#   batch_chunk_size: 32


# =============================================================================
# Search — providers, full-text fetch, page dedup
# =============================================================================
search:
#   provider: "serper"            # "serper", "brave", or "all"
#   enable_full_text_fetch: true
#   full_text_fetch_max_urls: 3
#   full_text_fetch_timeout: 15.0
#   page_stale_days: 30
#   page_fetch_max_extra_pages: 3
  full_text_fetch_per_budget_point: 5


# =============================================================================
# Fetch — URL content fetcher provider chain (DOI, httpx, curl_cffi, byparr)
# =============================================================================
# fetch:
#   # Provider chain — comma-separated, order = fallback order.
#   provider_chain: "doi,curl_cffi,httpx,flaresolverr"
#
#   # Browser-like UA used by httpx/doi tiers.
#   user_agent: "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) ..."
#
#   # curl_cffi impersonation profile (defeats most Cloudflare TLS fingerprinting).
#   curl_cffi_impersonate: "chrome124"
#
#   # FlareSolverr / Byparr endpoint.  Empty string disables the tier.
#   # In k8s the Byparr ClusterIP is reachable at http://byparr:8191/v1
#   flaresolverr_url: ""
#   flaresolverr_timeout: 60.0
#
#   # Static per-host preferred provider overrides.  Format: {host: provider_id}.
#   host_overrides: {}
#
#   # Crossref + Unpaywall require/recommend a contact email.
#   crossref_email: ""
#   unpaywall_email: ""


# =============================================================================
# Orchestrator — budgets, waves, timeouts, semantic expansion
# =============================================================================
orchestrator:
  model: "openrouter/google/gemini-3-flash-preview"
  # model: "openrouter/minimax/minimax-m2.5:nitro"
  # thinking_level: "low"
  scope_model: "openrouter/minimax/minimax-m2.5:nitro"              # model for scope planning / sub-explorer agents (default: orchestrator model)
  scope_thinking_level: "low"

  # nav_budget: 200
  # explore_budget: 20
  # wave_count: 2

  # enable_semantic_expansion: true
  # semantic_expansion_max_terms: 15
  # semantic_expansion_fact_threshold: 0.4

  # inactivity_timeout_seconds: 300
  # scope_timeout_seconds: 3600
  # hatchet_execution_timeout_minutes: 180
  # hatchet_schedule_timeout_minutes: 60  # max queue wait before task is cancelled
  # use_hatchet: true


# =============================================================================
# Decomposition — fact extraction, dedup, content limits
# =============================================================================
decomposition:
  # model: "openrouter/qwen/qwen3-32b:nitro"]
  # model: "openrouter/x-ai/grok-4.1-fast"
  model: "openrouter/google/gemini-3.1-flash-lite-preview"
  thinking_level: "low"
  entity_extraction_model: "openrouter/google/gemini-3.1-flash-lite-preview"
  # entity_extraction_model: "openrouter/xiaomi/mimo-v2-flash"
  entity_extraction_thinking_level: medium
  entity_extraction_batch_size: 40
  entity_extraction_concurrency: 10
  # file_model: ""
  # file_thinking_level: ""

  # fact_pool_threshold: 0.40
  # max_content_tokens: 500
  # stale_after_days: 30
  # llm_call_timeout_seconds: 180


# =============================================================================
# Concept extractor plugin — shell classifier + alias generator
# =============================================================================
concept_extractor:
  shell_model: "openrouter/google/gemma-4-26b-a4b-it:nitro"
  shell_thinking_level: ""
  shell_batch_size: 40
  shell_concurrency: 5
  alias_model: "openrouter/google/gemini-3-flash-preview"
  alias_thinking_level: "minimal"
  alias_batch_size: 40
  alias_concurrency: 5


# =============================================================================
# Synthesis — answer generation from navigated nodes
# =============================================================================
synthesis:
  model: "openrouter/minimax/minimax-m2.7:nitro"
#   thinking_level: ""
#   chat_model: ""
#   chat_thinking_level: ""
#   query_agent_model: ""


# =============================================================================
# Node pipeline — dimensions, definitions
# =============================================================================
node_pipeline:
  dimension_fact_limit: 100
  dimension_saturation_ratio: 0.9
  dimension_model: "openrouter/xiaomi/mimo-v2-flash:nitro"
  dimension_thinking_level: ""
#   dimension_pool_multiplier: 2
#   definition_model: ""
#   definition_thinking_level: ""


# =============================================================================
# Edges — resolution, classification, thresholds, parent selection
# =============================================================================
# =============================================================================
# On-demand enrichment — when rebuild/enrich should regenerate dimensions
# =============================================================================
enrichment:
  # Rebuild-mode enrich marks nodes "partial" below this fact count.
  # Lowered from default 100 so niche topics with few facts still get dims
  # and appear in the graph.
  min_facts_for_dimensions: 20


edges:
  resolution_model: "openrouter/x-ai/grok-4.1-fast"
#   resolution_thinking_level: ""
#   relation_dedup_threshold: 0.15
#   staleness_days: 30
#   classification_batch_size: 5
#   facts_per_type_cap: 20
#   facts_per_candidate_cap: 40
#   parent_selection_model: ""
#   parent_selection_thinking_level: ""


