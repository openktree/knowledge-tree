apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "knowledge-tree.graphDbName" . }}
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "graph-db") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  instances: {{ .Values.graphDb.instances }}
  imageName: {{ .Values.graphDb.image }}
  enableSuperuserAccess: true

  postgresql:
    shared_preload_libraries:
      {{- toYaml .Values.graphDb.postgresql.shared_preload_libraries | nindent 6 }}
    parameters:
      max_connections: {{ .Values.graphDb.postgresql.max_connections | quote }}

  bootstrap:
    initdb:
      database: knowledge_tree
      owner: kt
      secret:
        name: {{ .Values.graphDb.credentialsSecret | default (printf "%s-credentials" (include "knowledge-tree.graphDbName" .)) }}
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
        - CREATE EXTENSION IF NOT EXISTS pg_trgm

  storage:
    size: {{ .Values.graphDb.storage.size }}
    {{- if .Values.graphDb.storage.storageClass }}
    storageClass: {{ .Values.graphDb.storage.storageClass }}
    {{- end }}

  resources:
    {{- toYaml .Values.graphDb.resources | nindent 4 }}
{{- if not .Values.graphDb.credentialsSecret }}
---
{{- $credSecretName := printf "%s-credentials" (include "knowledge-tree.graphDbName" .) }}
{{- $existingCred := lookup "v1" "Secret" .Release.Namespace $credSecretName }}
{{- $password := "" }}
{{- if $existingCred }}
  {{- $password = index (default dict $existingCred.data) "password" | default "" }}
  {{- if $password }}
    {{- $password = $password | b64dec }}
  {{- end }}
{{- end }}
{{- $password = $password | default .Values.secrets.graphDbPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $credSecretName }}
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: kt
  password: {{ $password | quote }}
{{- end }}
