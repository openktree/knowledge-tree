{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "knowledge-tree.fullname" . }}
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
type: Opaque
stringData:
  openrouter-api-key: {{ .Values.secrets.openrouterApiKey | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
  brave-key: {{ .Values.secrets.braveKey | quote }}
  serper-key: {{ .Values.secrets.serperKey | quote }}
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | quote }}
  google-oauth-client-id: {{ .Values.secrets.googleOauthClientId | quote }}
  google-oauth-client-secret: {{ .Values.secrets.googleOauthClientSecret | quote }}
  hatchet-client-token: {{ .Values.secrets.hatchetClientToken | quote }}
  hatchet-admin-email: {{ .Values.secrets.hatchetAdminEmail | quote }}
  hatchet-admin-password: {{ .Values.secrets.hatchetAdminPassword | quote }}
{{- end }}
