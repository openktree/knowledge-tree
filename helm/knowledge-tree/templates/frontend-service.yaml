apiVersion: v1
kind: Service
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-frontend
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
  selector:
    {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
