name: Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend-matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-backend: ${{ steps.build-matrix.outputs.has-backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kt-config:
              - 'libs/kt-config/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kt-db:
              - 'libs/kt-db/**'
              - 'libs/kt-config/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kt-models:
              - 'libs/kt-models/**'
              - 'libs/kt-config/**'
              - 'libs/kt-db/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kt-providers:
              - 'libs/kt-providers/**'
              - 'libs/kt-config/**'
              - 'libs/kt-agents-core/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kt-graph:
              - 'libs/kt-graph/**'
              - 'libs/kt-db/**'
              - 'libs/kt-models/**'
              - 'libs/kt-config/**'
              - 'libs/kt-qdrant/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kt-facts:
              - 'libs/kt-facts/**'
              - 'libs/kt-db/**'
              - 'libs/kt-models/**'
              - 'libs/kt-providers/**'
              - 'libs/kt-config/**'
              - 'libs/kt-agents-core/**'
              - 'pyproject.toml'
              - 'uv.lock'
            kt-ontology:
              - 'libs/kt-ontology/**'
              - 'libs/kt-db/**'
              - 'libs/kt-graph/**'
              - 'libs/kt-models/**'
              - 'libs/kt-config/**'
              - 'libs/kt-qdrant/**'
              - 'pyproject.toml'
              - 'uv.lock'
            api:
              - 'services/api/**'
              - 'libs/**'
              - 'pyproject.toml'
              - 'uv.lock'
            mcp:
              - 'services/mcp/**'
              - 'libs/kt-db/**'
              - 'libs/kt-config/**'
              - 'libs/kt-graph/**'
              - 'libs/kt-qdrant/**'
              - 'pyproject.toml'
              - 'uv.lock'
            frontend:
              - 'frontend/**'
      - name: Build test matrix from changed packages
        id: build-matrix
        run: |
          MATRIX="[]"
          add() { MATRIX=$(echo "$MATRIX" | jq --arg n "$1" --arg p "$2" '. + [{"name": $n, "path": $p}]'); }

          [ "${{ steps.filter.outputs.kt-config }}" = "true" ]   && add "kt-config"   "libs/kt-config"
          [ "${{ steps.filter.outputs.kt-db }}" = "true" ]       && add "kt-db"        "libs/kt-db"
          [ "${{ steps.filter.outputs.kt-models }}" = "true" ]   && add "kt-models"    "libs/kt-models"
          [ "${{ steps.filter.outputs.kt-providers }}" = "true" ] && add "kt-providers" "libs/kt-providers"
          [ "${{ steps.filter.outputs.kt-graph }}" = "true" ]    && add "kt-graph"     "libs/kt-graph"
          [ "${{ steps.filter.outputs.kt-facts }}" = "true" ]    && add "kt-facts"     "libs/kt-facts"
          [ "${{ steps.filter.outputs.kt-ontology }}" = "true" ] && add "kt-ontology"  "libs/kt-ontology"
          [ "${{ steps.filter.outputs.api }}" = "true" ]         && add "api"           "services/api"
          [ "${{ steps.filter.outputs.mcp }}" = "true" ]         && add "mcp"           "services/mcp"

          echo "matrix={\"suite\":$(echo "$MATRIX" | jq -c '.')}" >> "$GITHUB_OUTPUT"
          echo "has-backend=$([ "$(echo "$MATRIX" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Changed suites: $(echo "$MATRIX" | jq -r '[.[].name] | join(", ")')"

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-test:
    name: Test ${{ matrix.suite.name }}
    needs: changes
    if: needs.changes.outputs.has-backend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.backend-matrix) }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: knowledge_tree
          POSTGRES_USER: kt
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kt -d knowledge_tree"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      postgres-write:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: knowledge_tree_write
          POSTGRES_USER: kt
          POSTGRES_PASSWORD: localdev
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U kt -d knowledge_tree_write"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://kt:localdev@localhost:5432/knowledge_tree
      WRITE_DATABASE_URL: postgresql+asyncpg://kt:localdev@localhost:5435/knowledge_tree_write
      REDIS_URL: redis://localhost:6379
      SKIP_AUTH: "true"
      HATCHET_CLIENT_TOKEN: "eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJzZXJ2ZXJfdXJsIjogImh0dHA6Ly9sb2NhbGhvc3Q6ODA4MCIsICJncnBjX2Jyb2FkY2FzdF9hZGRyZXNzIjogImxvY2FsaG9zdDo3MDcwIiwgInN1YiI6ICJjaSIsICJpYXQiOiAxNTE2MjM5MDIyfQ.ZmFrZXNpZw"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --frozen
      - name: Run tests
        run: >-
          uv run pytest ${{ matrix.suite.path }}/tests/ -x -n auto
          --ignore=${{ matrix.suite.path }}/tests/integration
          ${{ matrix.suite.name == 'kt-ontology' && '--ignore=libs/kt-ontology/tests/test_crystallization.py' || '' }}

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: cd frontend && pnpm lint
      - run: cd frontend && pnpm type-check
      - run: cd frontend && pnpm test
