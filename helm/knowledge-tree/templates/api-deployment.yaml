apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-api
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "knowledge-tree.initWaitContainers" . | nindent 8 }}
        {{- include "knowledge-tree.initWaitForToken" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "knowledge-tree.image" (dict "root" . "image" .Values.api.image "defaultName" "openktree-api") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            {{- include "knowledge-tree.sharedEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "knowledge-tree.configVolumeMount" . | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        {{- include "knowledge-tree.configVolume" . | nindent 8 }}
