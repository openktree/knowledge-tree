name: Build & Push

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/openktree/knowledge-tree

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend-matrix: ${{ steps.detect.outputs.build-matrix }}
      backend-retag: ${{ steps.detect.outputs.retag-list }}
      has-backend: ${{ steps.detect.outputs.has-changes }}
      frontend: ${{ steps.frontend.outputs.changed }}
      wiki-frontend: ${{ steps.wiki.outputs.changed }}
      docs-site: ${{ steps.docs.outputs.changed }}
      landing-page: ${{ steps.landing.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect backend changes
        id: detect
        uses: ./.github/actions/detect-tag-changes
        with:
          services: >-
            [
              {"service": "api",                   "image": "openktree-api"},
              {"service": "mcp",                   "image": "openktree-mcp"},
              {"service": "worker-bottomup",   "image": "openktree-worker-bottomup"},
              {"service": "worker-search",         "image": "openktree-worker-search"},
              {"service": "worker-nodes",          "image": "openktree-worker-nodes"},
              {"service": "worker-ingest",         "image": "openktree-worker-ingest"},
              {"service": "worker-sync",           "image": "openktree-worker-sync"},
              {"service": "worker-synthesis",     "image": "openktree-worker-synthesis"}
            ]
      - name: Detect frontend changes
        id: frontend
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git diff --name-only "$PREV_TAG" HEAD -- frontend/ helm/knowledge-tree/frontend/)
            echo "changed=$([ -n "$CHANGES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect wiki-frontend changes
        id: wiki
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git diff --name-only "$PREV_TAG" HEAD -- wiki-frontend/ helm/knowledge-tree/wiki-frontend/)
            echo "changed=$([ -n "$CHANGES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect docs-site changes
        id: docs
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git diff --name-only "$PREV_TAG" HEAD -- docs-site/)
            echo "changed=$([ -n "$CHANGES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect landing-page changes
        id: landing
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git diff --name-only "$PREV_TAG" HEAD -- landing-page/)
            echo "changed=$([ -n "$CHANGES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi

  backend-images:
    name: Build ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.has-backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.backend-matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  frontend-image:
    name: Build openktree-frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/openktree-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: helm/knowledge-tree/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  wiki-frontend-image:
    name: Build openktree-wiki-frontend
    needs: changes
    if: needs.changes.outputs.wiki-frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/openktree-wiki-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: helm/knowledge-tree/wiki-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=wiki-frontend
          cache-to: type=gha,mode=max,scope=wiki-frontend

  docs-site-image:
    name: Build openktree-docs-site
    needs: changes
    if: needs.changes.outputs.docs-site == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/openktree-docs-site
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./docs-site
          file: docs-site/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docs-site
          cache-to: type=gha,mode=max,scope=docs-site

  landing-page-image:
    name: Build openktree-landing-page
    needs: changes
    if: needs.changes.outputs.landing-page == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/openktree-landing-page
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./landing-page
          file: landing-page/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing-page
          cache-to: type=gha,mode=max,scope=landing-page

  retag-unchanged:
    name: Re-tag unchanged images
    needs: [changes, backend-images, frontend-image, wiki-frontend-image, docs-site-image, landing-page-image]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: imjasonh/setup-crane@v0.4
      - name: Re-tag unchanged backend images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RETAG_LIST: ${{ needs.changes.outputs.backend-retag }}
        run: |
          echo "$RETAG_LIST" | jq -c '.[]' | while read -r entry; do
            IMAGE="${{ env.IMAGE_PREFIX }}/$(echo "$entry" | jq -r '.image')"
            echo "Re-tagging $IMAGE:latest → $VERSION"
            crane tag "$IMAGE:latest" "$VERSION" || echo "Warning: failed to re-tag $IMAGE"
            crane tag "$IMAGE:latest" "${VERSION%.*}" || true
          done
      - name: Re-tag frontend if unchanged
        if: needs.changes.outputs.frontend != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/openktree-frontend"
          echo "Re-tagging $IMAGE:latest → $VERSION"
          crane tag "$IMAGE:latest" "$VERSION" || echo "Warning: failed to re-tag $IMAGE"
          crane tag "$IMAGE:latest" "${VERSION%.*}" || true
      - name: Re-tag wiki-frontend if unchanged
        if: needs.changes.outputs.wiki-frontend != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/openktree-wiki-frontend"
          echo "Re-tagging $IMAGE:latest → $VERSION"
          crane tag "$IMAGE:latest" "$VERSION" || echo "Warning: failed to re-tag $IMAGE"
          crane tag "$IMAGE:latest" "${VERSION%.*}" || true
      - name: Re-tag docs-site if unchanged
        if: needs.changes.outputs.docs-site != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/openktree-docs-site"
          echo "Re-tagging $IMAGE:latest → $VERSION"
          crane tag "$IMAGE:latest" "$VERSION" || echo "Warning: failed to re-tag $IMAGE"
          crane tag "$IMAGE:latest" "${VERSION%.*}" || true
      - name: Re-tag landing-page if unchanged
        if: needs.changes.outputs.landing-page != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/openktree-landing-page"
          echo "Re-tagging $IMAGE:latest → $VERSION"
          crane tag "$IMAGE:latest" "$VERSION" || echo "Warning: failed to re-tag $IMAGE"
          crane tag "$IMAGE:latest" "${VERSION%.*}" || true
