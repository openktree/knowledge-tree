{{- if and .Values.hatchet.tokenJob.enabled (not .Values.secrets.hatchetClientToken) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-hatchet-token
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "4"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-hatchet-token
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "4"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "knowledge-tree.secretName" . | quote }}]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-hatchet-token
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "4"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
subjects:
  - kind: ServiceAccount
    name: {{ include "knowledge-tree.fullname" . }}-hatchet-token
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "knowledge-tree.fullname" . }}-hatchet-token
{{- end }}
