name: Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --frozen
      - run: uv run --frozen ruff check .
      - run: uv run --frozen ruff format --check .

  backend-test:
    name: Test ${{ matrix.suite.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - { name: kt-config, path: libs/kt-config }
          - { name: kt-db, path: libs/kt-db }
          - { name: kt-models, path: libs/kt-models }
          - { name: kt-providers, path: libs/kt-providers }
          - { name: kt-graph, path: libs/kt-graph }
          - { name: kt-facts, path: libs/kt-facts }
          - { name: kt-ontology, path: libs/kt-ontology }
          - { name: api, path: services/api }
          - { name: mcp, path: services/mcp }
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: knowledge_tree
          POSTGRES_USER: kt
          POSTGRES_PASSWORD: localdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kt -d knowledge_tree"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      postgres-write:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: knowledge_tree_write
          POSTGRES_USER: kt
          POSTGRES_PASSWORD: localdev
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U kt -d knowledge_tree_write"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://kt:localdev@localhost:5432/knowledge_tree
      WRITE_DATABASE_URL: postgresql+asyncpg://kt:localdev@localhost:5435/knowledge_tree_write
      REDIS_URL: redis://localhost:6379
      SKIP_AUTH: "true"
      HATCHET_CLIENT_TOKEN: "eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJzZXJ2ZXJfdXJsIjogImh0dHA6Ly9sb2NhbGhvc3Q6ODA4MCIsICJncnBjX2Jyb2FkY2FzdF9hZGRyZXNzIjogImxvY2FsaG9zdDo3MDcwIiwgInN1YiI6ICJjaSIsICJpYXQiOiAxNTE2MjM5MDIyfQ.ZmFrZXNpZw"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --frozen
      - name: Run tests
        run: >-
          uv run --frozen pytest ${{ matrix.suite.path }}/tests/ -x -n auto
          --ignore=${{ matrix.suite.path }}/tests/integration
          ${{ matrix.suite.name == 'kt-ontology' && '--ignore=libs/kt-ontology/tests/test_crystallization.py' || '' }}

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: cd frontend && pnpm lint
      - run: cd frontend && pnpm type-check
      - run: cd frontend && pnpm test
