apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowledge-tree.pgbouncerName" . }}
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "pgbouncer") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "pgbouncer") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/pgbouncer-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: pgbouncer
          image: {{ .Values.pgbouncer.image }}
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: config
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "knowledge-tree.pgbouncerName" . }}
