apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "knowledge-tree.hatchetDbName" . }}
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "hatchet-db") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  instances: {{ .Values.hatchetDb.instances }}
  imageName: {{ .Values.hatchetDb.image }}

  postgresql:
    parameters:
      max_connections: {{ .Values.hatchetDb.postgresql.max_connections | quote }}

  bootstrap:
    initdb:
      database: hatchet
      owner: hatchet
      secret:
        name: {{ .Values.hatchetDb.credentialsSecret | default (printf "%s-credentials" (include "knowledge-tree.hatchetDbName" .)) }}

  storage:
    size: {{ .Values.hatchetDb.storage.size }}
    {{- if .Values.hatchetDb.storage.storageClass }}
    storageClass: {{ .Values.hatchetDb.storage.storageClass }}
    {{- end }}

  resources:
    {{- toYaml .Values.hatchetDb.resources | nindent 4 }}
{{- if not .Values.hatchetDb.credentialsSecret }}
---
{{- $credSecretName := printf "%s-credentials" (include "knowledge-tree.hatchetDbName" .) }}
{{- $existingCred := lookup "v1" "Secret" .Release.Namespace $credSecretName }}
{{- $password := "" }}
{{- if $existingCred }}
  {{- $password = index (default dict $existingCred.data) "password" | default "" }}
  {{- if $password }}
    {{- $password = $password | b64dec }}
  {{- end }}
{{- end }}
{{- $password = $password | default .Values.secrets.hatchetDbPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $credSecretName }}
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: hatchet
  password: {{ $password | quote }}
{{- end }}
