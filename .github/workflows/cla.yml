name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target' && github.event.action != 'closed') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: main
          allowlist: charlie83Gs,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            **To sign**, please comment on this PR with the following exact statement:

            > I have read the CLA Document and I hereby sign the CLA

            If your employer has intellectual property rights over your work, a [Corporate CLA](https://github.com/${{ github.repository }}/blob/main/CLA-CORPORATE.md) may also be required.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA."
          lock-pullrequest-aftermerge: false

  cla-cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: ".github/cla-signatures.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: main
          lock-pullrequest-aftermerge: false
