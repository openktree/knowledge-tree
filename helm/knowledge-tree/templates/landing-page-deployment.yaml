{{- if .Values.landingPage.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-landing-page
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "landing-page") | nindent 4 }}
spec:
  replicas: {{ .Values.landingPage.replicas }}
  selector:
    matchLabels:
      {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "landing-page") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "landing-page") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: landing-page
          image: {{ include "knowledge-tree.image" (dict "root" . "image" .Values.landingPage.image "defaultName" "openktree-landing-page") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: SITE_DOMAIN
              value: {{ .Values.landingPage.siteDomain | default .Values.global.siteDomain | default "openktree.com" | quote }}
          ports:
            - containerPort: {{ .Values.landingPage.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.landingPage.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.landingPage.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.landingPage.resources | nindent 12 }}
{{- end }}
