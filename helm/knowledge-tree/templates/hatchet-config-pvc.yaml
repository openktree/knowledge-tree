apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-hatchet-config
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "hatchet") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.hatchet.configStorage.size }}
  {{- if .Values.hatchet.configStorage.storageClass }}
  storageClassName: {{ .Values.hatchet.configStorage.storageClass }}
  {{- end }}
