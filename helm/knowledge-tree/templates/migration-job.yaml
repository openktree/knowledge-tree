{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-migrations-{{ .Release.Revision }}
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "knowledge-tree.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-graph-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "knowledge-tree.graphDbHost" . }} 5432; do echo "waiting for graph-db..."; sleep 2; done']
        - name: wait-for-write-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "knowledge-tree.writeDbHost" . }} 5432; do echo "waiting for write-db..."; sleep 2; done']
        # Create pgvector extension as superuser before Alembic runs
        - name: create-extensions
          image: {{ .Values.graphDb.image }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Creating pgvector extension (requires superuser)..."
              PGPASSWORD="$POSTGRES_PASSWORD" psql \
                -h {{ include "knowledge-tree.graphDbHost" . }} \
                -U postgres \
                -d knowledge_tree \
                -c "CREATE EXTENSION IF NOT EXISTS vector;"
              echo "Extension created"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "knowledge-tree.graphDbName" . }}-superuser
                  key: password
      containers:
        - name: migrate
          image: {{ include "knowledge-tree.image" (dict "root" . "image" .Values.api.image "defaultName" "openktree-api") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Running graph-db migrations..."
              cd /app/libs/kt-db
              uv run alembic upgrade head

              echo "Running write-db migrations..."
              uv run alembic -c alembic_write.ini upgrade head

              echo "Migrations complete"
          env:
            - name: GRAPH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-credentials" (include "knowledge-tree.graphDbName" .)) .Values.graphDb.credentialsSecret }}
                  key: password
            - name: WRITE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-credentials" (include "knowledge-tree.writeDbName" .)) .Values.writeDb.credentialsSecret }}
                  key: password
            # Migrations connect directly to CNPG (not PgBouncer) for DDL
            - name: DATABASE_URL
              value: "postgresql+asyncpg://kt:$(GRAPH_DB_PASSWORD)@{{ include "knowledge-tree.graphDbHost" . }}:5432/knowledge_tree"
            - name: WRITE_DATABASE_URL
              value: "postgresql+asyncpg://kt:$(WRITE_DB_PASSWORD)@{{ include "knowledge-tree.writeDbHost" . }}:5432/knowledge_tree_write"
{{- end }}
