{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "knowledge-tree.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwtSecret := "" }}
{{- $hatchetAdminPassword := "" }}
{{- $hatchetAdminEmail := "" }}
{{- if $existing }}
  {{- $jwtSecret = index (default dict $existing.data) "jwt-secret-key" | default "" }}
  {{- if $jwtSecret }}
    {{- $jwtSecret = $jwtSecret | b64dec }}
  {{- end }}
  {{- $hatchetAdminPassword = index (default dict $existing.data) "hatchet-admin-password" | default "" }}
  {{- if $hatchetAdminPassword }}
    {{- $hatchetAdminPassword = $hatchetAdminPassword | b64dec }}
  {{- end }}
  {{- $hatchetAdminEmail = index (default dict $existing.data) "hatchet-admin-email" | default "" }}
  {{- if $hatchetAdminEmail }}
    {{- $hatchetAdminEmail = $hatchetAdminEmail | b64dec }}
  {{- end }}
{{- end }}
{{- $jwtSecret = .Values.secrets.jwtSecretKey | default $jwtSecret | default (randAlphaNum 64) }}
{{- $hatchetAdminPassword = .Values.secrets.hatchetAdminPassword | default $hatchetAdminPassword | default (printf "%s!%s" (randAlphaNum 24) (randNumeric 4)) }}
{{- $hatchetAdminEmail = .Values.secrets.hatchetAdminEmail | default $hatchetAdminEmail | default "admin@knowledge-tree.local" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
type: Opaque
stringData:
  openrouter-api-key: {{ .Values.secrets.openrouterApiKey | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
  brave-key: {{ .Values.secrets.braveKey | quote }}
  serper-key: {{ .Values.secrets.serperKey | quote }}
  jwt-secret-key: {{ $jwtSecret | quote }}
  google-oauth-client-id: {{ .Values.secrets.googleOauthClientId | quote }}
  google-oauth-client-secret: {{ .Values.secrets.googleOauthClientSecret | quote }}
  hatchet-client-token: {{ .Values.secrets.hatchetClientToken | quote }}
  hatchet-admin-email: {{ $hatchetAdminEmail | quote }}
  hatchet-admin-password: {{ $hatchetAdminPassword | quote }}
  api-token: {{ .Values.secrets.apiToken | quote }}
{{- end }}
