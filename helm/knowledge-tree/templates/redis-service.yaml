apiVersion: v1
kind: Service
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-redis
  labels:
    {{- include "knowledge-tree.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    {{- include "knowledge-tree.componentSelectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
