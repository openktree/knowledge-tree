# Knowledge Tree — Quickstart
#
# Get up and running with a single command:
#
#   cp .env.example .env
#   # Edit .env to add your API keys (OPENROUTER_API_KEY is required)
#   docker compose -f docker-compose.quickstart.yml up -d
#
# Then open http://localhost:3000 and register your first account.
# The first user is automatically promoted to admin.
#
# See QUICKSTART.md for full instructions.

x-common-env: &common-env
  DATABASE_URL: "postgresql+asyncpg://kt:localdev@postgres:5432/knowledge_tree"
  WRITE_DATABASE_URL: "postgresql+asyncpg://kt:localdev@pgbouncer-write:5432/knowledge_tree_write"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"

services:

  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    command: postgres -c max_connections=100
    environment:
      POSTGRES_DB: knowledge_tree
      POSTGRES_USER: kt
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kt -d knowledge_tree"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-write:
    image: postgres:16-alpine
    command: postgres -c max_connections=400 -c work_mem=32MB -c shared_buffers=256MB
    shm_size: 512m
    environment:
      POSTGRES_DB: knowledge_tree_write
      POSTGRES_USER: kt
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata_write:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kt -d knowledge_tree_write"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer-write:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://kt:localdev@postgres-write:5432/knowledge_tree_write"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "100"
      MIN_POOL_SIZE: "10"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_QUERY: "DISCARD ALL"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
      AUTH_TYPE: plain
    depends_on:
      postgres-write:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432", "-U", "kt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  hatchet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hatchet
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
    volumes:
      - hatchet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet -d hatchet"]
      interval: 5s
      timeout: 5s
      retries: 5

  hatchet:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:v0.79.22
    depends_on:
      hatchet-db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@hatchet-db:5432/hatchet?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_PORT: "7070"
      SERVER_GRPC_BROADCAST_ADDRESS: "127.0.0.1:7077"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_MAX_MSG_SIZE: "16777216"
      SERVER_URL: "http://localhost:8080"
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_FLUSH_PERIOD_MILLISECONDS: "250"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Database Migrations (runs once, then exits) ──────────────────

  migrate:
    image: ghcr.io/openktree/knowledge-tree/openktree-api:latest
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Running graph-db migrations..."
        cd /app && uv run --project services/api alembic -c libs/kt-db/alembic.ini upgrade head
        echo "Running write-db migrations..."
        cd /app && uv run --project services/api alembic -c libs/kt-db/alembic_write.ini upgrade head
        echo "Migrations complete."
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer-write:
        condition: service_healthy

  # ── Application Services ────────────────────────────────────────

  api:
    image: ghcr.io/openktree/knowledge-tree/openktree-api:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer-write:
        condition: service_healthy
      redis:
        condition: service_healthy
      hatchet:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ghcr.io/openktree/knowledge-tree/openktree-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - api

  worker-bottomup:
    image: ghcr.io/openktree/knowledge-tree/openktree-worker-bottomup:latest
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G

  worker-search:
    image: ghcr.io/openktree/knowledge-tree/openktree-worker-search:latest
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G

  worker-nodes:
    image: ghcr.io/openktree/knowledge-tree/openktree-worker-nodes:latest
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G

  worker-ingest:
    image: ghcr.io/openktree/knowledge-tree/openktree-worker-ingest:latest
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G

  worker-synthesis:
    image: ghcr.io/openktree/knowledge-tree/openktree-worker-synthesis:latest
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G

  worker-sync:
    image: ghcr.io/openktree/knowledge-tree/openktree-worker-sync:latest
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  pgdata:
  pgdata_write:
  redisdata:
  qdrantdata:
  hatchet_pgdata:
