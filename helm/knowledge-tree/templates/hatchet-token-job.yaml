{{- if and .Values.hatchet.tokenJob.enabled (not .Values.secrets.hatchetClientToken) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "knowledge-tree.fullname" . }}-hatchet-token
  labels:
    {{- include "knowledge-tree.labels" . | nindent 4 }}
  annotations: {}
spec:
  backoffLimit: {{ .Values.hatchet.tokenJob.backoffLimit }}
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "knowledge-tree.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hatchet-token-job
    spec:
      serviceAccountName: {{ include "knowledge-tree.fullname" . }}-hatchet-token
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-hatchet
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Hatchet to be fully ready..."
              # Wait for HTTP liveness first
              until wget -q --spider http://{{ include "knowledge-tree.fullname" . }}-hatchet:8080/api/live 2>/dev/null; do
                sleep 5
              done
              echo "Hatchet HTTP is up, waiting for gRPC..."
              # Wait for gRPC port (workers connect here — ensures DB migrations are done)
              until nc -z {{ include "knowledge-tree.fullname" . }}-hatchet 7070; do
                sleep 3
              done
              # Extra settle time for internal initialization after ports are open
              sleep 10
              echo "Hatchet is ready"
      containers:
        - name: generate-token
          image: {{ .Values.hatchet.image }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Generating Hatchet client token..."

              # Retry token generation — Hatchet may need time after ports are open
              TOKEN=""
              for attempt in 1 2 3 4 5; do
                TOKEN=$(/hatchet-admin token create --config /config --name "knowledge-tree" 2>/dev/null | grep '^eyJ' || true)
                if [ -n "$TOKEN" ]; then
                  break
                fi
                echo "  attempt ${attempt}/5 failed, retrying in 10s..."
                sleep 10
              done

              if [ -z "$TOKEN" ]; then
                echo "ERROR: Failed to generate token after 5 attempts"
                /hatchet-admin token create --config /config --name "knowledge-tree" 2>&1
                exit 1
              fi
              echo "Token generated (${#TOKEN} chars), patching secret..."

              # Base64 encode the token
              TOKEN_B64=$(echo -n "$TOKEN" | base64 -w 0)

              # Patch the secret via Kubernetes API
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              APISERVER=https://kubernetes.default.svc
              SECRET_NAME="{{ include "knowledge-tree.secretName" . }}"

              PATCH="{\"data\":{\"hatchet-client-token\":\"${TOKEN_B64}\"}}"

              wget -q -O- --method=PATCH \
                --header="Authorization: Bearer ${KUBE_TOKEN}" \
                --header="Content-Type: application/strategic-merge-patch+json" \
                --body-data="${PATCH}" \
                --ca-certificate=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                "${APISERVER}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}" \
                > /dev/null

              echo "Secret patched with Hatchet client token"

              # Restart worker deployments so they pick up the new token.
              # We do this by annotating each deployment, which triggers a rollout.
              for DEPLOY in api worker-orchestrator worker-search worker-nodes \
                            worker-query worker-ingest worker-conversations worker-sync; do
                DEPLOY_NAME="{{ include "knowledge-tree.fullname" . }}-${DEPLOY}"
                PATCH_BODY="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"hatchet-token/refreshed-at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}}}}"
                wget -q -O- --method=PATCH \
                  --header="Authorization: Bearer ${KUBE_TOKEN}" \
                  --header="Content-Type: application/strategic-merge-patch+json" \
                  --body-data="${PATCH_BODY}" \
                  --ca-certificate=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  "${APISERVER}/apis/apps/v1/namespaces/${NAMESPACE}/deployments/${DEPLOY_NAME}" \
                  > /dev/null 2>&1 || echo "  (skipped ${DEPLOY} — may not exist)"
              done

              echo "Worker deployments restarted"
          env:
            - name: HATCHET_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-credentials" (include "knowledge-tree.hatchetDbName" .)) .Values.hatchetDb.credentialsSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://hatchet:$(HATCHET_DB_PASSWORD)@{{ include "knowledge-tree.hatchetDbHost" . }}:5432/hatchet?sslmode=disable"
{{- end }}
